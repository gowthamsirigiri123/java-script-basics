<!DOCTYPE html>
<html>
<head>
    <title>Product Discount Calculator</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
        }

        h1 {
            color: black;
        }

        select, input {
            padding: 10px;
            margin: 10px;
        }
        select:hover{
             background-color: blanchedalmond;
            
        }
        input:hover{
            background-color: blanchedalmond;
        }

        button {
            padding: 10px 20px;
            background-color: green;
            color: white;
            border: none;
            border-radius: 10px;
        }
        button:hover{
            background-color: rgb(71, 211, 80);
        }

        #result {
            margin-top: 20px;
            font-size: 20px;
            color: blue;
        }
    </style>
</head>
<body>

    <h1>Product Discount Calculator</h1>

    <!-- Dropdown -->
     <label>Select Product :</label>
    <select id="product">
        <option value="">Select Product</option>
        <option value="500">Mouse</option>
        <option value="1000">Keyboard</option>
        <option value="2000">Laptop</option>
    </select>

    <br>

    <!-- Discount Input -->
     <label>Enter discount:</label>
    <input type="number" id="discount" placeholder="Enter Discount %">

    <br>

    <!-- Button -->
    <button onclick="calculate()">Get final discount</button>

    <!-- Result -->
    <div id="result"></div>

    <script>
        function calculate() {
            let price = document.getElementById("product").value;
            let discount = document.getElementById("discount").value;

            // Convert to number
            price = Number(price);
            discount = Number(discount);

            if (price === 0 || discount === 0) {
                document.getElementById("result").innerText = "Please select product and enter discount";
                return;
            }

            let discountAmount = (price * discount) / 100;
            let total = price - discountAmount;
            document.getElementById("result").innerText = "Original price: " + price + "\nTotal Amount: " + total;
        }
    </script>

</body>
</html>
