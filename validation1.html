<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact Us Form</title>

<!-- Google reCAPTCHA -->
<script src="https://www.google.com/recaptcha/api.js" async defer></script>

<style>

body {
font-family: Arial, sans-serif;
background: #f5f5f5;
}

.container {
    display: flex;

width: 100%;
margin: 40px auto;
background: white;
padding: 30px;
box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
}
.gow{
    width: 30%;
}
.form-group{
    width: 140%;
}
h2 {
margin-bottom: 5px;
}
label{
    color: rgba(rgb(5, 5, 5,0.6), green, blue, alpha);
}
.form-group {
margin-bottom: 20px;
}

.row{
    display: flex;
    gap: 40px;
}
.half{
    width: 50%;
}
input, select, textarea {
width: 100%;
padding: 10px;
border: none;
border-bottom: 1px dotted #ccc;
}
option{
    color:rgba(80, 77, 77, 0.6); 
}
textarea {
height: 120px;
}

button {
background: #e60023;
color: white;
padding: 12px 25px;
border: none;
cursor: pointer;
font-size: 16px;
}

button:hover {
background: #c4001d;
}

.error {
color: red;
font-size: 13px;
}

.success {
color: green;
font-weight: bold;
margin-bottom: 15px;
}

.checkbox {
display: flex;
align-items: center;
}

.checkbox input {
width: auto;
margin-right: 10px;
}

@media(max-width:768px){
.container{
width:95%;
}
}

</style>

</head>

<body>

<div class="container">
<div class="gow">
<h2>Contact Us</h2>
<p>Let us know how we can help.</p>
</div>
<div id="successMessage" class="success"></div>

<form id="contactForm" onsubmit="return validateForm()">
<div class="row">
<div class="form-group half">

<input type="text" id="name" placeholder="name">
<div class="error" id="nameError"></div>
</div>

<div class="form-group half">

<input type="text" id="email" placeholder="your email adress">
<div class="error" id="emailError"></div>
</div>
</div>
<div class="form-group">

<select id="inquiry" aria-placeholder="your inquiry">
<option value="">your quries</option>
<option>General</option>
<option>Support</option>
<option>Sales</option>
</select>
<div class="error" id="inquiryError"></div>
</div>

<div class="form-group">

<input type="text" id="company" placeholder="company">
</div>

<div class="form-group">

<select id="country" placeholder="country">
<option value="">Select Country</option>
<option>India</option>
<option>USA</option>
<option>UK</option>
</select>
<div class="error" id="countryError"></div>
</div>

<div class="form-group">
<textarea id="message" placeholder="message"></textarea>
<div class="error" id="messageError"></div>
</div>

<div class="form-group checkbox">
<input type="checkbox" id="agree">
<label>By submitting this form I agree to Privacy Policy</label>
</div>
<div class="error" id="agreeError"></div>

<!-- CAPTCHA -->
<div class="form-group">
<div class="g-recaptcha" data-sitekey="6LcKmqwsAAAAADL246PtsTmsnP_lz-A1Lh12-guw"></div>
<div class="error" id="captchaError"></div>
</div>

<button type="submit">SUBMIT</button>

</form>

</div>

<script>

function validateForm(){

let valid = true;

document.querySelectorAll(".error").forEach(e => e.innerHTML="");
document.getElementById("successMessage").innerHTML="";

let name = document.getElementById("name").value.trim();
let email = document.getElementById("email").value.trim();
let inquiry = document.getElementById("inquiry").value;
let country = document.getElementById("country").value;
let message = document.getElementById("message").value.trim();
let agree = document.getElementById("agree").checked;

let emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

if(name==""){
document.getElementById("nameError").innerHTML="Name required";
valid=false;
}

if(email==""){
document.getElementById("emailError").innerHTML="Email required";
valid=false;
}
else if(!email.match(emailPattern)){
document.getElementById("emailError").innerHTML="Enter valid email";
valid=false;
}

if(inquiry==""){
document.getElementById("inquiryError").innerHTML="Select inquiry";
valid=false;
}

if(country==""){
document.getElementById("countryError").innerHTML="Select country";
valid=false;
}

if(message==""){
document.getElementById("messageError").innerHTML="Message required";
valid=false;
}

if(!agree){
document.getElementById("agreeError").innerHTML="Accept policy";
valid=false;
}

/* CAPTCHA validation */

if(typeof grecaptcha === "defined"){
var response = grecaptcha.getResponse();

if(response.length == 0){
document.getElementById("captchaError").innerHTML="Please verify captcha";
valid=false;
}
}

/* Success */

if(valid){

alert("submited")
document.getElementById("contactForm").reset();

if(typeof grecaptcha !== "undefined"){
grecaptcha.reset();
}

return false;
}

return false;

}

</script>

</body>
</html>
